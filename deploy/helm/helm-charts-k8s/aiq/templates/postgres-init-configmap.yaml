{{- $postgres := index .Values.apps "postgres" }}
{{- $bootstrap := .Values.bootstrap | default dict }}
{{- $createPostgresInitConfigMap := true }}
{{- if hasKey $bootstrap "createPostgresInitConfigMap" }}
{{- $createPostgresInitConfigMap = $bootstrap.createPostgresInitConfigMap }}
{{- end }}
{{- if and $createPostgresInitConfigMap $postgres $postgres.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $bootstrap.postgresInitConfigMapName | default (printf "%s-postgres-init" .Values.project.name) }}
  namespace: {{ include "aiq.namespace" . }}
  labels:
    app: {{ .Values.project.name }}-postgres
    component: postgres
data:
  init.sql: |
{{ .Files.Get "files/init-db.sql" | indent 4 }}
{{- end }}
