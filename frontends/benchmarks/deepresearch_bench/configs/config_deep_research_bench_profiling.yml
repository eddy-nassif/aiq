# Deep Research Bench (DRB) Evaluation Configuration
# Uses Langchain Deep Agents for deep research evaluation

general:
  telemetry:
    logging:
      console:
        _type: console
        level: INFO
    # tracing:
      # phoenix:
      #   _type: phoenix
      #   endpoint: http://localhost:6006/v1/traces
      #   project: dev
      # weave:
      #   _type: weave
      #   project: "nvidia-aiq/AIQ_v2_deepresearch_bench"
  use_uvloop: true

llms:
  nemotron_super_llm:
    _type: nim
    model_name: nvidia/nemotron-3-super-120b-a12b
    base_url: "https://integrate.api.nvidia.com/v1"
    temperature: 0.7
    top_p: 0.7
    max_tokens: 65536
    num_retries: 5
    chat_template_kwargs:
      enable_thinking: true

  openai_gpt_5_2:
    _type: openai
    model_name: "gpt-5.2"
    api_key: ${OPENAI_API_KEY}

  gpt_oss_llm:
    _type: nim
    model_name: openai/gpt-oss-120b
    base_url: "https://integrate.api.nvidia.com/v1"
    temperature: 1.0
    top_p: 1.0
    max_tokens: 256000
    api_key: ${NVIDIA_API_KEY}
    max_retries: 10

functions:
  paper_search_tool:
    _type: paper_search
    max_results: 5
    serper_api_key: ${SERPER_API_KEY}

  advanced_web_search_tool:
    _type: tavily_web_search
    max_results: 2
    advanced_search: true

  deep_research_agent:
    _type: deep_research_agent
    orchestrator_llm: openai_gpt_5_2
    source_router_llm: nemotron_super_llm
    researcher_llm: nemotron_super_llm
    planner_llm: nemotron_super_llm
    writer_llm: nemotron_super_llm
    max_loops: 2
    tools:
      - paper_search_tool
      - advanced_web_search_tool

workflow:
  _type: deep_research_workflow

eval:
  general:
    workflow_alias: "aiq-deepresearcher"
    output_dir: frontends/benchmarks/deepresearch_bench/results
    max_concurrency: 4
    profiler:
      # Compute inter query token uniqueness
      token_uniqueness_forecast: true
      # Compute expected workflow runtime
      workflow_runtime_forecast: true
      # Compute inference optimization metrics
      compute_llm_metrics: true
      # Avoid dumping large text into the output CSV (helpful to not break structure)
      csv_exclude_io_text: true
      # Idenitfy common prompt prefixes
      prompt_caching_prefixes:
        enable: true
        min_frequency: 0.1
      bottleneck_analysis:
        # Can also be simple_stack
        enable_nested_stack: true
      concurrency_spike_analysis:
        enable: true
        spike_threshold: 7
      # Build a prediction trie for Dynamo routing hints
      prediction_trie:
        enable: true
        # Auto-compute latency sensitivity per LLM call position
        auto_sensitivity: true
        sensitivity_scale: 5
        # Weights for the three scoring signals (must sum to 1.0)
        w_critical: 0.5
        w_fanout: 0.3
        w_position: 0.2
        # Penalty for LLM calls that run in parallel with longer siblings (default 0.0)
        w_parallel: 0.0
    dataset:
      _type: json
      file_path: frontends/benchmarks/deepresearch_bench/data/drb_full_dataset.json
      structure:
        question_key: question
        answer_key: expected_output
        generated_answer_key: generated_answer
      filter:
        allowlist:
          field:
            id: [88, 80, 84, 90, 59, 51, 94, 96, 91, 99, 93, 86, 67, 100, 72, 76]
