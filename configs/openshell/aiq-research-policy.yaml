version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /etc
    - /var/log
    - /proc
    - /dev/urandom
  read_write:
    - /sandbox
    - /workspace
    - /tmp
    - /dev/null

# Fail closed when the host cannot enforce Landlock filesystem confinement. Local demo
# environments that intentionally accept weaker isolation must generate a separate policy
# with `scripts/openshell/setup_openshell.sh --landlock-compatibility best_effort` and configure
# `require_hard_landlock: false` explicitly.
landlock:
  compatibility: hard_requirement

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  github:
    name: github-readonly
    endpoints:
      - host: api.github.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: github.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
    binaries:
      - { path: /usr/bin/curl }
      - { path: /usr/local/bin/python3 }
      - { path: /usr/local/bin/python }
      - { path: /usr/local/bin/pip }
      - { path: /usr/local/bin/pip3 }
  nvidia:
