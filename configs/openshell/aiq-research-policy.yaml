version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /etc
    - /app
    - /var/log
    - /proc/self
    - /dev/urandom
  read_write:
    - /sandbox
    - /workspace
    - /tmp
    - /dev/null

# best_effort lets the sandbox start on hosts without Landlock (e.g. Docker Desktop on
# macOS), but there filesystem confinement is silently dropped. Acceptable only for the
# local single-operator demo; production must use `hard_requirement` (fail closed).
landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  github:
    name: github-readonly
    endpoints:
      - host: api.github.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: github.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
    binaries:
      - { path: /usr/bin/curl }
      - { path: /usr/local/bin/python3 }
      - { path: /usr/local/bin/python }
      - { path: /usr/local/bin/pip }
      - { path: /usr/local/bin/pip3 }
  nvidia:
