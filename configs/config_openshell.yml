# EXPERIMENTAL: one policy-bound OpenShell sandbox per deep-research job.
# Canonical operator guide: docs/source/deployment/openshell.md

general:
  use_uvloop: true
  telemetry:
    logging:
      console:
        _type: console
        level: INFO

  front_end:
    _type: aiq_api
    runner_class: aiq_api.plugin.AIQAPIWorker
    db_url: ${NAT_JOB_STORE_DB_URL:-sqlite+aiosqlite:///./jobs.db}
    expiry_seconds: 86400
    cors:
      allow_origin_regex: 'http://localhost(:\d+)?|http://127.0.0.1(:\d+)?'
      allow_methods:
        - GET
        - POST
        - DELETE
        - OPTIONS
      allow_headers:
        - "*"
      allow_credentials: true
      expose_headers:
        - "*"

llms:
  nemotron_llm_intent:
    _type: nim
    model_name: nvidia/nemotron-3-super-120b-a12b
    base_url: "https://integrate.api.nvidia.com/v1"
    temperature: 0.5
    top_p: 0.9
    max_tokens: 4096
    num_retries: 5
    chat_template_kwargs:
      enable_thinking: true

  nemotron_super_llm:
    _type: nim
    model_name: nvidia/nemotron-3-super-120b-a12b
    base_url: "https://integrate.api.nvidia.com/v1"
    temperature: 0.7
    top_p: 0.7
    max_tokens: 65536
    num_retries: 5
    chat_template_kwargs:
      enable_thinking: true

  summary_llm:
    _type: nim
    model_name: nvidia/nemotron-mini-4b-instruct
    base_url: "https://integrate.api.nvidia.com/v1"
    api_key: ${NVIDIA_API_KEY}
    temperature: 0.3
    max_tokens: 100

functions:
  data_sources:
    _type: data_source_registry
    sources:
      - id: web_search
        name: "Web Search"
        description: "Search the web for real-time information."
        tools:
          - web_search_tool
          - advanced_web_search_tool
      - id: knowledge_layer
        name: "Knowledge Base"
        description: "Search uploaded documents and files."
        tools:
          - knowledge_search

  web_search_tool:
    _type: tavily_web_search
    max_results: 5
    max_content_length: 1000

  advanced_web_search_tool:
    _type: tavily_web_search
    max_results: 2
    advanced_search: true

  knowledge_search:
    _type: knowledge_retrieval
    backend: llamaindex
    collection_name: ${COLLECTION_NAME:-test_collection}
    generate_summary: true
    summary_model: summary_llm
    summary_db: ${AIQ_SUMMARY_DB:-sqlite+aiosqlite:///./summaries.db}
    top_k: 5
    chroma_dir: ${AIQ_CHROMA_DIR:-/tmp/chroma_data}

  intent_classifier:
    _type: intent_classifier
    llm: nemotron_llm_intent
    verbose: true

  clarifier_agent:
    _type: clarifier_agent
    llm: nemotron_super_llm
    max_turns: 3
    log_response_max_chars: 2000
    verbose: true

  shallow_research_agent:
    _type: shallow_research_agent
    llm: nemotron_super_llm
    exclude_tools:
      - advanced_web_search_tool
    verbose: true
    max_llm_turns: 10
    max_tool_iterations: 5

  # OpenShell configuration: skills + sandbox
  deep_research_skills:
    _type: deep_research_skills
    agents:
      researcher-agent: [research]
      writer-agent: [synthesis, research]
    require_sandbox:
      - research

  deep_research_sandbox:
    _type: deep_research_sandbox
    provider: openshell
    openshell_image: ${AIQ_OPENSHELL_IMAGE:-aiq-openshell-demo:latest}
    policy: ${AIQ_OPENSHELL_POLICY_FILE:-configs/openshell/generated/aiq-openshell-policy.yaml}
    workdir: /sandbox
    # The OpenShell policy is authoritative. This declaration is an upper bound:
    # startup fails if the policy grants a hostname not listed here.
    network: allowlist
    network_allow:
      - api.github.com
      - github.com
      - integrate.api.nvidia.com
      - api.tavily.com
      - google.serper.dev
      - pypi.org
      - files.pythonhosted.org
      - huggingface.co
      - cdn-lfs.huggingface.co
      - export.arxiv.org
      - api.semanticscholar.org
      - registry.npmjs.org
    timeout: 1200
    idle_timeout: 1800
    policy_load_timeout_seconds: 30
    delete_on_exit: true
    attest: true
    require_hard_landlock: ${AIQ_OPENSHELL_REQUIRE_HARD_LANDLOCK:-true}
    artifact_capture:
      enabled: true
      max_file_bytes: 50000000
      allow_extensions: [.png, .jpg, .jpeg, .webp, .csv, .json, .md, .ipynb, .pdf]

  deep_research_agent:
    _type: deep_research_agent
    enable_citation_verification: true
    orchestrator_llm: nemotron_super_llm
    source_router_llm: nemotron_super_llm
    researcher_llm: nemotron_super_llm
    planner_llm: nemotron_super_llm
    writer_llm: nemotron_super_llm
    exclude_tools:
      - web_search_tool
    verbose: true
    skills: deep_research_skills
    sandbox: deep_research_sandbox

workflow:
  _type: chat_deepresearcher_agent
  verbose: true
  enable_escalation: true
  enable_clarifier: true
  use_async_deep_research: true
  checkpoint_db: ${AIQ_CHECKPOINT_DB:-./checkpoints.db}
