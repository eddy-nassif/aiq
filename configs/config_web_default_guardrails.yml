# Default Web mode configuration with NeMo Guardrails enabled at the workflow,
# shallow researcher, and deep researcher boundaries.

general:
  use_uvloop: true
  telemetry:
    logging:
      console:
        _type: console
        level: INFO

  front_end:
    _type: aiq_api
    runner_class: aiq_api.plugin.AIQAPIWorker
    db_url: ${NAT_JOB_STORE_DB_URL:-sqlite+aiosqlite:///./jobs.db}
    expiry_seconds: 86400
    cors:
      allow_origin_regex: 'http://localhost(:\d+)?|http://127.0.0.1(:\d+)?'
      allow_methods:
        - GET
        - POST
        - DELETE
        - OPTIONS
      allow_headers:
        - "*"
      allow_credentials: true
      expose_headers:
        - "*"

llms:
  nemotron_llm_intent:
    _type: nim
    model_name: nvidia/nemotron-3-super-120b-a12b
    base_url: "https://integrate.api.nvidia.com/v1"
    temperature: 0.5
    top_p: 0.9
    max_tokens: 4096
    num_retries: 5
    chat_template_kwargs:
      enable_thinking: true

  nemotron_super_llm:
    _type: nim
    model_name: nvidia/nemotron-3-super-120b-a12b
    base_url: "https://integrate.api.nvidia.com/v1"
    temperature: 0.7
    top_p: 0.7
    max_tokens: 65536
    num_retries: 5
    chat_template_kwargs:
      enable_thinking: true

  gpt_oss_llm:
    _type: nim
    model_name: openai/gpt-oss-120b
    base_url: https://integrate.api.nvidia.com/v1
    temperature: 1.0
    top_p: 1.0
    max_tokens: 256000
    api_key: ${NVIDIA_API_KEY}
    max_retries: 10

  summary_llm:
    _type: nim
    model_name: nvidia/nemotron-mini-4b-instruct
    base_url: "https://integrate.api.nvidia.com/v1"
    api_key: ${NVIDIA_API_KEY}
    temperature: 0.3
    max_tokens: 100

middleware:
  workflow_guardrails:
    _type: workflow_guardrails
    workflow_functions:
      "<workflow>":
        choices:
          - message.content
    guardrails:
      models: []
      colang_version: "1.0"
      rails:
        config:
          regex_detection:
            input:
              patterns:
                - '(?i)ignore\s+(all\s+)?previous\s+instructions'
                - '(?i)reveal\s+(the\s+)?system\s+prompt'
            output:
              patterns:
                - '(?i)system\s+prompt\s*[:=]'
                - '(?i)developer\s+message\s*[:=]'
        input:
          flows:
            - regex check input
        output:
          flows:
            - regex check output

  shallow_agent_guardrails:
    _type: shallow_agent_guardrails
    workflow_functions:
      shallow_research_agent:
        pre_invoke:
          messages:
            HumanMessage:
              - content
        post_invoke:
          messages:
            AIMessage:
              - content
    guardrails:
      models: []
      colang_version: "1.0"
      rails:
        config:
          regex_detection:
            input:
              patterns:
                - '(?i)reveal\s+(the\s+)?tool\s+credentials'
                - '(?i)show\s+(me\s+)?(your\s+)?tool\s+configuration'
            output:
              patterns:
                - '(?i)api[_-]?key\s*[:=]'
                - '(?i)password\s*[:=]'
        input:
          flows:
            - regex check input
        output:
          flows:
            - regex check output

  deep_agent_guardrails:
    _type: deep_agent_guardrails
    workflow_functions:
      deep_research_agent:
        pre_invoke:
          messages:
            HumanMessage:
              - content
        post_invoke:
          messages:
            AIMessage:
              - content
    guardrails:
      models: []
      colang_version: "1.0"
      rails:
        config:
          regex_detection:
            input:
              patterns:
                - '(?i)dump\s+(all\s+)?documents'
                - '(?i)exfiltrate\s+(the\s+)?knowledge\s+base'
            output:
              patterns:
                - '(?i)api[_-]?key\s*[:=]'
                - '(?i)password\s*[:=]'
        input:
          flows:
            - regex check input
        output:
          flows:
            - regex check output

functions:
  data_sources:
    _type: data_source_registry
    sources:
      - id: web_search
        name: "Web Search"
        description: "Search the web for real-time information."
        tools:
          - web_search_tool
          - advanced_web_search_tool
      - id: knowledge_layer
        name: "Knowledge Base"
        description: "Search uploaded documents and files."
        tools:
          - knowledge_search

  web_search_tool:
    _type: tavily_web_search
    max_results: 5
    max_content_length: 1000

  advanced_web_search_tool:
    _type: tavily_web_search
    max_results: 2
    advanced_search: true

  knowledge_search:
    _type: knowledge_retrieval
    backend: llamaindex
    collection_name: ${COLLECTION_NAME:-test_collection}
    generate_summary: true
    summary_model: summary_llm
    summary_db: ${AIQ_SUMMARY_DB:-sqlite+aiosqlite:///./summaries.db}
    top_k: 5
    chroma_dir: ${AIQ_CHROMA_DIR:-/tmp/chroma_data}

  intent_classifier:
    _type: intent_classifier
    llm: nemotron_llm_intent
    verbose: true

  clarifier_agent:
    _type: clarifier_agent
    llm: nemotron_super_llm
    max_turns: 3
    log_response_max_chars: 2000
    verbose: true

  shallow_research_agent:
    _type: shallow_research_agent
    llm: nemotron_super_llm
    exclude_tools:
      - advanced_web_search_tool
    verbose: true
    max_llm_turns: 10
    max_tool_iterations: 5

  deep_research_agent:
    _type: deep_research_agent
    orchestrator_llm: gpt_oss_llm
    source_router_llm: nemotron_super_llm
    researcher_llm: nemotron_super_llm
    planner_llm: gpt_oss_llm
    writer_llm: gpt_oss_llm
    exclude_tools:
      - web_search_tool
    verbose: true

workflow:
  _type: chat_deepresearcher_agent
  verbose: true
  enable_escalation: true
  enable_clarifier: true
  use_async_deep_research: true
  checkpoint_db: ${AIQ_CHECKPOINT_DB:-./checkpoints.db}
  middleware:
    - workflow_guardrails
